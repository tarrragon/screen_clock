# ============================================================
# 開發核心原則
# ============================================================
principles:
  - "每個版本對應一個 PROP 與其衍生的 SPEC/UC"
  - "TDD 四階段流程：Phase 0 SA / Phase 1 設計 / Phase 2 測試 / Phase 3a 策略 / Phase 3b 實作 / Phase 4 重構"
  - "v1.0 之前不考慮 Windows"
  - "MVP 樣式寫死；可設定能力推遲到 v1.0.0"

# ============================================================
# 技術債務追蹤
# ============================================================
tech_debt: []

# ============================================================
# 品質標準
# ============================================================
quality_standards:
  functionality:
    - "SPEC FR 條目皆有對應 ticket 與驗收"
    - "UC 的成功場景與例外場景皆有可驗證的測試或手動驗收步驟"
  testing:
    - "Widget Test：核心 widget 覆蓋（如時鐘、設定面板）"
    - "手動驗收：click-through、透明、CPU 使用率"
  code_quality:
    - "符合 .claude/rules/core/quality-baseline.md"
    - "無 Dart analyzer 警告"

