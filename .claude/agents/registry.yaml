        path_pattern: "docs/work-logs/v*/tickets/*analysis.md"

    requires:
      - capability: "architecture"

    preconditions:
      - condition: "ticket-exists"

    conflict_avoidance:
      - type: "cannot_work_with"
        agents: ["saffron-system-analyst"]

    tdd_phases:
      - "phase0"

    file_patterns:
