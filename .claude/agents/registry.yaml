# Agent Capability Registry
# Schema Version: 1.0.0
# 用途：Agent 能力宣告的機器可讀 Source of Truth
# 更新原則：每次新增或修改 agent 時同步更新
# 最後更新：2026-03-23（Phase 3b 初始化）

schema_version: "1.0"

agents:
  # ===== TDD Phase 代理人（五階段完整流程） =====

  lavender-interface-designer:
    name: lavender-interface-designer
    description: TDD Phase 1 功能設計專家。根據 Ticket 需求設計功能規格、API 介面定義、驗收標準。為後續測試和實作奠定基礎。
    model: sonnet
    color: purple
    version: "1.0"

    accepts:
      - artifact_type: "ticket"
        description: "包含功能需求的 Ticket"

    produces:
      - artifact_type: "phase1-design"
        path_pattern: "docs/work-logs/v*/tickets/*phase1-design.md"
        description: "功能規格、API 定義、驗收標準"

    requires:
      - capability: "serena-tools"
        description: "Markdown 撰寫和編輯能力"
      - capability: "analysis"
        description: "需求分析和功能設計"

    preconditions:
      - condition: "ticket-exists"
      - condition: "ticket-has-requirements"

    conflict_avoidance:
      - type: "cannot_work_with"
        agents: ["lavender-interface-designer"]
        reason: "同一 agent 不可重複派發至同一 Ticket"
      - type: "must_complete_before"
        agents: ["sage-test-architect"]
        reason: "Phase 1 必須完成才能進入 Phase 2"

    tdd_phases:
      - "phase1"

    file_patterns:
      - "docs/work-logs/v*/tickets/*phase1-design.md"
      - "docs/work-logs/v*/tickets/*feature-design.md"
      - "docs/work-logs/v*/tickets/*feature-spec.md"


  sage-test-architect:
    name: sage-test-architect
    description: TDD Phase 2 測試設計專家。根據 Phase 1 功能規格設計完整測試案例和測試策略。禁止程式碼實作。
    model: haiku
    color: red
    version: "1.0"

    accepts:
      - artifact_type: "phase1-design"
        description: "Phase 1 功能規格文件"
      - artifact_type: "ticket"
        description: "測試設計需求"

    produces:
      - artifact_type: "phase2-test-design"
        path_pattern: "docs/work-logs/v*/tickets/*phase2-test-design.md"
        description: "測試案例設計、測試策略、Given-When-Then 規格"
      - artifact_type: "test-cases"
        path_pattern: "docs/work-logs/v*/tickets/*test-design.md"
        description: "測試案例清單和規格"

    requires:
      - capability: "dart-analysis"
        description: "Dart/Flutter 程式碼理解（非實作）"
      - capability: "test-design"
        description: "測試設計和測試策略規劃"

    preconditions:
      - condition: "phase1-design-completed"
      - condition: "phase1-acceptance-approved"

    conflict_avoidance:
      - type: "cannot_work_with"
        agents: ["sage-test-architect"]
        reason: "同一 agent 不可重複派發至同一 Ticket"
      - type: "must_complete_before"
        agents: ["pepper-test-implementer"]
        reason: "Phase 2 必須完成才能進入 Phase 3a"

    tdd_phases:
      - "phase2"

    file_patterns:
      - "docs/work-logs/v*/tickets/*phase2-test-design.md"
      - "docs/work-logs/v*/tickets/*test-design.md"
      - "docs/work-logs/v*/tickets/*test-case-design.md"


  pepper-test-implementer:
    name: pepper-test-implementer
    description: TDD Phase 3a 實作策略規劃專家。根據測試設計規劃語言無關的實作策略、虛擬碼、流程圖。為多語言實作代理人指導實作方向。
    model: haiku
    color: orange
    version: "1.0"

    accepts:
      - artifact_type: "phase2-test-design"
        description: "Phase 2 測試設計文件"
      - artifact_type: "ticket"
        description: "策略規劃需求"

    produces:
      - artifact_type: "phase3a-strategy"
        path_pattern: "docs/work-logs/v*/tickets/*phase3a-strategy.md"
        description: "實作策略、虛擬碼、流程圖、技術方案"

    requires:
      - capability: "pseudocode"
        description: "虛擬碼設計能力"
      - capability: "architecture"
        description: "系統架構理解"

    preconditions:
      - condition: "phase2-test-design-completed"
      - condition: "phase2-acceptance-approved"

    conflict_avoidance:
      - type: "cannot_work_with"
        agents: ["pepper-test-implementer"]
        reason: "同一 agent 不可重複派發至同一 Ticket"
      - type: "must_complete_before"
        agents: ["parsley-flutter-developer"]
        reason: "Phase 3a 必須完成才能進入 Phase 3b"

    tdd_phases:
      - "phase3a"

    file_patterns:
      - "docs/work-logs/v*/tickets/*phase3a-strategy.md"


  parsley-flutter-developer:
    name: parsley-flutter-developer
    description: TDD Phase 3b Flutter 實作代理人。將 Phase 3a 語言無關策略轉換為高品質 Dart/Flutter 程式碼。執行測試驅動開發，確保 100% 測試通過。
    model: haiku
    color: green
    version: "1.0"

    accepts:
      - artifact_type: "phase3a-strategy"
        description: "Phase 3a 實作策略和虛擬碼"
      - artifact_type: "ticket"
        description: "實作需求"

    produces:
      - artifact_type: "phase3b-execution-report"
        path_pattern: "docs/work-logs/v*/tickets/*phase3b-execution-report.md"
        description: "實作執行報告、程式碼產出、測試結果"
      - artifact_type: "dart-code"
        path_pattern: "ui/lib/**/*.dart"
        description: "Dart/Flutter 程式碼（lib/）"
      - artifact_type: "dart-test"
        path_pattern: "ui/test/**/*_test.dart"
        description: "Dart 測試程式碼（test/）"

    requires:
      - capability: "dart-code"
        description: "Dart 程式碼撰寫能力"
      - capability: "flutter-framework"
        description: "Flutter 框架知識"
      - capability: "dart-test-execution"
        description: "Dart 測試執行能力（flutter test）"
      - capability: "git-commit"
        description: "Git commit 自治能力"

    preconditions:
      - condition: "phase3a-strategy-completed"
      - condition: "phase2-test-design-completed"
      - condition: "acceptance-auditor-approved"

    conflict_avoidance:
      - type: "cannot_work_with"
        agents: ["parsley-flutter-developer"]
        reason: "同一 agent 不可重複派發至同一 Ticket"
        scope: "same_ticket"
      - type: "cannot_work_with"
        agents: ["cinnamon-refactor-owl"]
        reason: "Phase 3b 和 Phase 4b 不可在同一 Ticket 並行派發（會修改相同 Dart 檔案）"
        scope: "same_ticket"
      - type: "must_complete_before"
        agents: ["cinnamon-refactor-owl"]
        reason: "Phase 3b 必須完成並測試通過才能進入 Phase 4b"

    tdd_phases:
      - "phase3b"

    file_patterns:
      - "ui/lib/**/*.dart"
      - "ui/test/**/*_test.dart"
      - "docs/work-logs/v*/tickets/*phase3b-execution-report.md"


  cinnamon-refactor-owl:
    name: cinnamon-refactor-owl
    description: TDD Phase 4b 重構代理人。在 Phase 3b 程式碼完成後執行程式碼品質優化、技術債務修復、重構執行。確保程式碼品質高標準。
    model: sonnet
    color: yellow
    version: "1.0"

    accepts:
      - artifact_type: "phase3b-execution-report"
        description: "Phase 3b 實作產出"
      - artifact_type: "phase4a-analysis"
        description: "Phase 4a 多視角重構分析報告"
      - artifact_type: "ticket"
        description: "重構需求"

    produces:
      - artifact_type: "phase4b-execution-report"
        path_pattern: "docs/work-logs/v*/tickets/*phase4b-execution-report.md"
        description: "重構執行報告、程式碼優化記錄、技術債務修復"
      - artifact_type: "dart-code"
        path_pattern: "ui/lib/**/*.dart"
        description: "重構後的 Dart 程式碼"

    requires:
      - capability: "refactoring"
        description: "程式碼重構和品質優化"
      - capability: "dart-code"
        description: "Dart 程式碼修改能力"
      - capability: "code-analysis"
        description: "程式碼品質分析"

    preconditions:
      - condition: "phase3b-completed"
      - condition: "phase3b-tests-pass"
      - condition: "phase4a-analysis-available-or-exempted"

    conflict_avoidance:
      - type: "cannot_work_with"
        agents: ["cinnamon-refactor-owl"]
        reason: "同一 agent 不可重複派發至同一 Ticket"
      - type: "cannot_work_with"
        agents: ["parsley-flutter-developer"]
        reason: "Phase 3b 和 Phase 4b 不可並行派發（共用 Dart 程式碼檔案）"

    tdd_phases:
      - "phase4b"

    file_patterns:
      - "ui/lib/**/*.dart"
      - "docs/work-logs/v*/tickets/*phase4b-execution-report.md"
      - "docs/work-logs/v*/tickets/*refactoring-report.md"



  # ===== 系統分析和設計代理人 =====

  saffron-system-analyst:
    name: saffron-system-analyst
    description: SA 前置審查專家。在 TDD 開始前審查新功能的系統一致性、架構合理性、重複實作檢查。
